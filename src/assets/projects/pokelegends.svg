<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100">
  <defs>
    <pattern id="tiles" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#171a12"/>
      <rect width="50" height="50" fill="#1c1f16"/>
      <rect x="50" y="50" width="50" height="50" fill="#1c1f16"/>
    </pattern>
  </defs>
  <rect width="1600" height="1100" fill="url(#tiles)"/>

  <!-- obstacles -->
  <rect x="80" y="120" width="140" height="140" rx="16" fill="#12140f" stroke="#292825"/>
  <circle cx="150" cy="170" r="34" fill="#22301f" stroke="#3a4a30"/>
  <rect x="1360" y="180" width="140" height="140" rx="16" fill="#12140f" stroke="#292825"/>
  <circle cx="1430" cy="230" r="34" fill="#22301f" stroke="#3a4a30"/>
  <rect x="1200" y="700" width="180" height="120" rx="10" fill="#12140f" stroke="#292825"/>
  <rect x="140" y="750" width="180" height="120" rx="10" fill="#12140f" stroke="#292825"/>

  <!-- player sprite -->
  <g transform="translate(800,520)">
    <ellipse cx="0" cy="90" rx="46" ry="12" fill="#000" opacity="0.4"/>
    <path d="M-40 40 Q0 -10 40 40 L30 95 Q0 115 -30 95 Z" fill="#c9a24b"/>
    <circle cx="0" cy="0" r="34" fill="#f5f4f0"/>
    <circle cx="-12" cy="-2" r="4" fill="#161615"/>
    <circle cx="12" cy="-2" r="4" fill="#161615"/>
  </g>

  <!-- HUD -->
  <rect x="40" y="40" width="360" height="90" rx="8" fill="#0a0a0a" stroke="#292825" opacity="0.92"/>
  <rect x="64" y="58" width="140" height="14" rx="4" fill="#f5f4f0"/>
  <rect x="64" y="84" width="280" height="16" rx="8" fill="#292825"/>
  <rect x="64" y="84" width="210" height="16" rx="8" fill="#7fae5c"/>

  <!-- inventory slots -->
  <g transform="translate(1180,940)">
    <rect x="0" y="0" width="72" height="72" rx="8" fill="#0a0a0a" stroke="#c9a24b" stroke-width="2"/>
    <circle cx="36" cy="36" r="16" fill="#c9a24b" opacity="0.85"/>
    <rect x="90" y="0" width="72" height="72" rx="8" fill="#0a0a0a" stroke="#292825"/>
    <path d="M116 20 L146 50 M146 20 L116 50" stroke="#aeada9" stroke-width="4" stroke-linecap="round"/>
    <rect x="180" y="0" width="72" height="72" rx="8" fill="#0a0a0a" stroke="#292825"/>
    <path d="M216 16 L236 26 L236 46 Q216 58 196 46 L196 26 Z" fill="none" stroke="#aeada9" stroke-width="3"/>
    <rect x="270" y="0" width="72" height="72" rx="8" fill="#0a0a0a" stroke="#292825"/>
    <circle cx="306" cy="36" r="18" fill="none" stroke="#c9a24b" stroke-width="3"/>
  </g>

  <!-- dialogue box -->
  <rect x="80" y="880" width="1000" height="150" rx="10" fill="#0a0a0a" stroke="#c9a24b" stroke-width="2"/>
  <rect x="120" y="920" width="700" height="14" rx="4" fill="#f5f4f0"/>
  <rect x="120" y="950" width="500" height="14" rx="4" fill="#aeada9"/>
  <path d="M1040 990 l20 20 l-20 20 z" fill="#c9a24b"/>
</svg>
